<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keyboard Builder</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111; color: #eee; overflow: hidden; height: 100vh; }
a { color: #6bf; }

/* ── Header / Steps ── */
header { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; background: #1a1a1a; border-bottom: 1px solid #333; height: 48px; z-index: 10; }
.steps { display: flex; gap: 4px; }
.step-btn { padding: 6px 16px; border-radius: 4px; font-size: 13px; border: 1px solid #444; background: #222; color: #888; cursor: default; transition: all 0.2s; }
.step-btn.active { background: #2a4a6a; color: #fff; border-color: #4a8abf; }
.step-btn.done { background: #1a3a1a; color: #6c6; border-color: #3a6a3a; cursor: pointer; }
.nav-btns { display: flex; gap: 8px; }
.nav-btns button { padding: 6px 20px; border-radius: 4px; font-size: 13px; border: 1px solid #555; background: #333; color: #ddd; cursor: pointer; }
.nav-btns button:hover:not(:disabled) { background: #444; }
.nav-btns button:disabled { opacity: 0.3; cursor: default; }
.nav-btns button.primary { background: #2a6abf; border-color: #4a8adf; color: #fff; }
.nav-btns button.primary:hover:not(:disabled) { background: #3a7adf; }

/* ── Pages ── */
.page { display: none; height: calc(100vh - 48px); }
.page.active { display: flex; flex-direction: column; }

/* ── Page 1: Finger Input ── */
#page1 .toolbar { display: flex; align-items: center; gap: 6px; padding: 8px 12px; background: #1a1a1a; border-bottom: 1px solid #333; flex-wrap: wrap; }
#page1 .toolbar .col-btn { padding: 4px 12px; border-radius: 3px; font-size: 12px; border: 2px solid transparent; cursor: pointer; color: #000; font-weight: 600; }
#page1 .toolbar .col-btn.active { border-color: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.4); }
#page1 .toolbar .col-btn .count { font-size: 10px; opacity: 0.7; margin-left: 4px; }
#page1 .toolbar .sep { width: 1px; height: 24px; background: #444; margin: 0 4px; }
#page1 .toolbar .tool-btn { padding: 4px 10px; border-radius: 3px; font-size: 11px; border: 1px solid #555; background: #333; color: #ccc; cursor: pointer; }
#page1 .toolbar .tool-btn:hover { background: #444; }
.canvas-wrap { flex: 1; position: relative; background: #0a0a0a; overflow: hidden; }
.canvas-wrap canvas { display: block; width: 100%; height: 100%; }
.canvas-hint { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #444; font-size: 18px; pointer-events: none; text-align: center; line-height: 1.6; }
.canvas-hint.hidden { display: none; }

/* ── Page 2: 3D View ── */
#page2 .toolbar { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: #1a1a1a; border-bottom: 1px solid #333; flex-wrap: wrap; }
#page2 .toolbar label { font-size: 12px; color: #aaa; display: flex; align-items: center; gap: 4px; }
#page2 .toolbar input[type=range] { width: 120px; }
#page2 .toolbar input[type=checkbox] { accent-color: #4a8abf; }
#viewport { flex: 1; position: relative; background: #0a0a0a; }
#viewport canvas { display: block; }
#loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #888; font-size: 16px; }

/* ── Page 3: BOM ── */
#page3 { overflow-y: auto; padding: 20px; }
#page3 h2 { margin: 20px 0 10px; font-size: 18px; color: #adf; }
#page3 h2:first-child { margin-top: 0; }
#page3 table { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 13px; }
#page3 th { text-align: left; padding: 6px 10px; background: #222; border-bottom: 2px solid #444; color: #aaa; font-weight: 600; }
#page3 td { padding: 6px 10px; border-bottom: 1px solid #2a2a2a; }
#page3 tr:hover td { background: #1a1a2a; }
#page3 .phase-total { text-align: right; font-weight: 600; color: #8c8; padding: 8px 10px; }
#page3 .grand-total { font-size: 18px; font-weight: 700; color: #adf; text-align: right; padding: 16px 0; border-top: 2px solid #444; margin-top: 8px; }
.download-row { display: flex; gap: 12px; margin-top: 16px; }
.download-row button { padding: 10px 24px; border-radius: 6px; font-size: 14px; border: 1px solid #4a8adf; background: #2a5a9f; color: #fff; cursor: pointer; }
.download-row button:hover { background: #3a6abf; }
</style>
</head>
<body>

<header>
  <div class="steps">
    <div class="step-btn active" data-step="1">1. Finger Positions</div>
    <div class="step-btn" data-step="2">2. 3D Preview</div>
    <div class="step-btn" data-step="3">3. Bill of Materials</div>
  </div>
  <div class="nav-btns">
    <button id="btn-back" disabled>Back</button>
    <button id="btn-next" class="primary" disabled>Next</button>
  </div>
</header>

<div id="page1" class="page active">
  <div class="toolbar" id="col-toolbar"></div>
  <div class="canvas-wrap">
    <canvas id="tap-canvas"></canvas>
    <div class="canvas-hint" id="canvas-hint">
      Select a finger column above, then<br>tap 3 positions: bottom, home, top row
    </div>
  </div>
</div>

<!-- ═══════════════ PAGE 2: 3D Preview ═══════════════ -->
<div id="page2" class="page">
  <div class="toolbar">
    <label>Fold: <input type="range" id="fold-slider" min="0" max="160" step="5" value="0"> <span id="fold-val">0</span>&deg;</label>
    <label><input type="checkbox" id="show-cables" checked> Cables</label>
    <label><input type="checkbox" id="show-hinge" checked> Hinge</label>
    <label><input type="checkbox" id="show-battery" checked> Battery</label>
  </div>
  <div id="viewport">
    <div id="loading">Processing layout...</div>
  </div>
</div>

<div id="page3" class="page">
  <div id="bom-content"></div>
  <div class="download-row">
    <button id="btn-download">Download Design Files (.zip)</button>
  </div>
</div>

<script>
window.hull = (function() {
  // intersect.js
  function ccw(x1,y1,x2,y2,x3,y3) {
    var cw = ((y3-y1)*(x2-x1)) - ((y2-y1)*(x3-x1));
    return cw > 0 ? true : cw < 0 ? false : true;
  }
  function intersect(seg1, seg2) {
    var x1=seg1[0][0],y1=seg1[0][1],x2=seg1[1][0],y2=seg1[1][1],
        x3=seg2[0][0],y3=seg2[0][1],x4=seg2[1][0],y4=seg2[1][1];
    return ccw(x1,y1,x3,y3,x4,y4) !== ccw(x2,y2,x3,y3,x4,y4) &&
           ccw(x1,y1,x2,y2,x3,y3) !== ccw(x1,y1,x2,y2,x4,y4);
  }
  // format.js
  var formatUtil = {
    toXy: function(ps, fmt) {
      if (!fmt) return ps.slice();
      var xn=fmt[0].slice(1), yn=fmt[1].slice(1);
      return ps.map(function(p){return [p[xn],p[yn]];});
    },
    fromXy: function(ps, fmt) {
      if (!fmt) return ps.slice();
      var xn=fmt[0].slice(1), yn=fmt[1].slice(1);
      return ps.map(function(p){var o={};o[xn]=p[0];o[yn]=p[1];return o;});
    }
  };
  // grid.js
  function Grid(points, cellSize) {
    this._cells=[]; this._cellSize=cellSize; this._reverseCellSize=1/cellSize;
    for (var i=0;i<points.length;i++) {
      var p=points[i], x=this.coordToCellNum(p[0]), y=this.coordToCellNum(p[1]);
      if (!this._cells[x]) { var a=[]; a[y]=[p]; this._cells[x]=a; }
      else if (!this._cells[x][y]) { this._cells[x][y]=[p]; }
      else { this._cells[x][y].push(p); }
    }
  }
  Grid.prototype = {
    cellPoints: function(x,y) { return (this._cells[x]!==undefined&&this._cells[x][y]!==undefined)?this._cells[x][y]:[]; },
    rangePoints: function(bbox) {
      var tlX=this.coordToCellNum(bbox[0]),tlY=this.coordToCellNum(bbox[1]),brX=this.coordToCellNum(bbox[2]),brY=this.coordToCellNum(bbox[3]),pts=[];
      for(var x=tlX;x<=brX;x++) for(var y=tlY;y<=brY;y++) { var cp=this.cellPoints(x,y); for(var i=0;i<cp.length;i++) pts.push(cp[i]); }
      return pts;
    },
    removePoint: function(point) {
      var cx=this.coordToCellNum(point[0]),cy=this.coordToCellNum(point[1]),cell=this._cells[cx][cy];
      for(var i=0;i<cell.length;i++) if(cell[i][0]===point[0]&&cell[i][1]===point[1]){cell.splice(i,1);break;}
      return cell;
    },
    coordToCellNum: function(x) { return Math.trunc(x*this._reverseCellSize); },
    extendBbox: function(bbox, sf) { return [bbox[0]-sf*this._cellSize,bbox[1]-sf*this._cellSize,bbox[2]+sf*this._cellSize,bbox[3]+sf*this._cellSize]; }
  };
  function grid(points, cellSize) { return new Grid(points, cellSize); }
  // convex.js
  function _ccw(p1,p2,p3) { return (p2[0]-p1[0])*(p3[1]-p1[1])-(p2[1]-p1[1])*(p3[0]-p1[0])<=0; }
  function _tangent(ps) { var r=[]; for(var t=0;t<ps.length;t++){while(r.length>1&&_ccw(r[r.length-2],r[r.length-1],ps[t]))r.pop();r.push(ps[t]);}r.pop();return r; }
  function convexHull(ps) { var u=_tangent(ps),l=_tangent(ps.reverse()),c=l.concat(u);c.push(ps[0]);return c; }
  // hull.js
  var MAX_CONCAVE_ANGLE_COS = Math.cos(90/(180/Math.PI));
  var MAX_SEARCH_BBOX_SIZE_PERCENT = 0.6;
  function _filterDuplicates(ps) { var u=[ps[0]],lp=ps[0]; for(var i=1;i<ps.length;i++){var c=ps[i];if(lp[0]!==c[0]||lp[1]!==c[1])u.push(c);lp=c;} return u; }
  function _sortByX(ps) { return ps.sort(function(a,b){return(a[0]-b[0])||(a[1]-b[1]);}); }
  function _sqLength(a,b) { return Math.pow(b[0]-a[0],2)+Math.pow(b[1]-a[1],2); }
  function _cos(o,a,b) { var as=[a[0]-o[0],a[1]-o[1]],bs=[b[0]-o[0],b[1]-o[1]]; return(as[0]*bs[0]+as[1]*bs[1])/Math.sqrt(_sqLength(o,a)*_sqLength(o,b)); }
  function _intersect(seg,ps) { for(var i=0;i<ps.length-1;i++){var s=[ps[i],ps[i+1]];if(seg[0][0]===s[0][0]&&seg[0][1]===s[0][1]||seg[0][0]===s[1][0]&&seg[0][1]===s[1][1])continue;if(intersect(seg,s))return true;}return false; }
  function _occupiedArea(ps) { var mnX=Infinity,mnY=Infinity,mxX=-Infinity,mxY=-Infinity; for(var i=ps.length-1;i>=0;i--){if(ps[i][0]<mnX)mnX=ps[i][0];if(ps[i][1]<mnY)mnY=ps[i][1];if(ps[i][0]>mxX)mxX=ps[i][0];if(ps[i][1]>mxY)mxY=ps[i][1];}return[mxX-mnX,mxY-mnY]; }
  function _bBoxAround(e) { return[Math.min(e[0][0],e[1][0]),Math.min(e[0][1],e[1][1]),Math.max(e[0][0],e[1][0]),Math.max(e[0][1],e[1][1])]; }
  function _midPoint(edge,innerPts,convex) {
    var pt=null,a1c=MAX_CONCAVE_ANGLE_COS,a2c=MAX_CONCAVE_ANGLE_COS;
    for(var i=0;i<innerPts.length;i++){var c1=_cos(edge[0],edge[1],innerPts[i]),c2=_cos(edge[1],edge[0],innerPts[i]);
      if(c1>a1c&&c2>a2c&&!_intersect([edge[0],innerPts[i]],convex)&&!_intersect([edge[1],innerPts[i]],convex)){a1c=c1;a2c=c2;pt=innerPts[i];}}
    return pt;
  }
  function _concave(convex,maxSqEdgeLen,maxSearchArea,g,skipList) {
    var inserted=false;
    for(var i=0;i<convex.length-1;i++){var edge=[convex[i],convex[i+1]],key=edge[0][0]+','+edge[0][1]+','+edge[1][0]+','+edge[1][1];
      if(_sqLength(edge[0],edge[1])<maxSqEdgeLen||skipList.has(key))continue;
      var sf=0,bb=_bBoxAround(edge),bw,bh,mp;
      do{bb=g.extendBbox(bb,sf);bw=bb[2]-bb[0];bh=bb[3]-bb[1];mp=_midPoint(edge,g.rangePoints(bb),convex);sf++;}while(mp===null&&(maxSearchArea[0]>bw||maxSearchArea[1]>bh));
      if(bw>=maxSearchArea[0]&&bh>=maxSearchArea[1])skipList.add(key);
      if(mp!==null){convex.splice(i+1,0,mp);g.removePoint(mp);inserted=true;}}
    if(inserted)return _concave(convex,maxSqEdgeLen,maxSearchArea,g,skipList);
    return convex;
  }
  function hull(pointset, concavity, format) {
    var maxEdgeLen=concavity||20;
    var points=_filterDuplicates(_sortByX(formatUtil.toXy(pointset,format)));
    if(points.length<4){var c=points.concat([points[0]]);return format?formatUtil.fromXy(c,format):c;}
    var oa=_occupiedArea(points),msa=[oa[0]*MAX_SEARCH_BBOX_SIZE_PERCENT,oa[1]*MAX_SEARCH_BBOX_SIZE_PERCENT];
    var cv=convexHull(points),inner=points.filter(function(p){return cv.indexOf(p)<0;});
    var cs=Math.ceil(1/(points.length/(oa[0]*oa[1])));
    var cc=_concave(cv,Math.pow(maxEdgeLen,2),msa,grid(inner,cs),new Set());
    return format?formatUtil.fromXy(cc,format):cc;
  }
  return hull;
})();
</script>

<!-- ═══════════════ Main Application ═══════════════ -->
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { SVGLoader } from 'three/addons/loaders/SVGLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

'use strict';

// ══════════════════════════════════════════════════════════════════
// ERGOPAD → ERGOGEN CONVERTER (ported from ergopad_to_ergogen.py)
// ══════════════════════════════════════════════════════════════════

const MATRIX_COLUMNS = ['pinky', 'ring', 'middle', 'index', 'index_far'];
const ERGOGEN_NAMES  = ['pinky', 'ring', 'middle', 'index', 'inner'];

function fitLine(points) {
  const n = points.length;
  if (n === 0) return { angle: 0, cx: 0, cy: 0, distances: [] };
  if (n === 1) return { angle: 0, cx: points[0].x, cy: points[0].y, distances: [] };
  const xs = points.map(p => p.x), ys = points.map(p => p.y);
  const cx = xs.reduce((a,b)=>a+b,0)/n, cy = ys.reduce((a,b)=>a+b,0)/n;
  const sorted = points.slice().sort((a,b) => a.y - b.y);
  const bot = sorted[0], top = sorted[n-1];
  const dx = top.x - bot.x, dy = top.y - bot.y;
  let angle = 0;
  if (Math.abs(dy) >= 0.01 || Math.abs(dx) >= 0.01) {
    angle = Math.atan2(dx, dy) * 180 / Math.PI;
  }
  const rad = angle * Math.PI / 180;
  const axX = Math.sin(rad), axY = Math.cos(rad);
  const projs = sorted.map(p => (p.x - cx)*axX + (p.y - cy)*axY);
  const distances = [];
  for (let i = 1; i < projs.length; i++) distances.push(Math.abs(projs[i] - projs[i-1]));
  return { angle, cx, cy, distances };
}

function analyzeColumn(points) {
  if (!points || !points.length) return null;
  const { angle, cx, cy, distances } = fitLine(points);
  const padding = distances.length ? distances.reduce((a,b)=>a+b,0)/distances.length : 18.0;
  return { center: [cx, cy], angle, padding, nKeys: points.length };
}

function estimateScale(data, keySpacing) {
  const allDist = [];
  for (const col of Object.keys(data)) {
    if (data[col].length < 2) continue;
    const { distances } = fitLine(data[col]);
    allDist.push(...distances);
  }
  if (!allDist.length) return 1.0;
  const avg = allDist.reduce((a,b)=>a+b,0) / allDist.length;
  return avg < 0.01 ? 1.0 : avg / keySpacing;
}

function rd(v) { return Math.round(v * 10) / 10; }

function ergopadToErgogen(data, mirrorDist, keySpacing) {
  mirrorDist = mirrorDist || 22;
  keySpacing = keySpacing || 18;
  // Flip Y
  const flipped = {};
  for (const col of Object.keys(data)) {
    flipped[col] = data[col].map(p => ({ x: p.x, y: -p.y }));
  }
  // Scale
  let ppm = estimateScale(flipped, keySpacing);
  if (ppm <= 0) ppm = 1.0;
  const scaled = {};
  for (const col of Object.keys(flipped)) {
    scaled[col] = flipped[col].map(p => ({ x: p.x/ppm, y: p.y/ppm }));
  }
  // Analyze matrix columns
  const analyses = {};
  for (const col of MATRIX_COLUMNS) {
    if (scaled[col] && scaled[col].length) analyses[col] = analyzeColumn(scaled[col]);
  }
  // Analyze thumb
  const thumbPts = scaled.thumb || [];
  const thumbInfo = thumbPts.length ? analyzeColumn(thumbPts) : null;

  // Build ergogen columns
  const columns = {};
  let prevCenter = null, cumulativeAngle = 0;
  MATRIX_COLUMNS.forEach((ergopadCol, i) => {
    const info = analyses[ergopadCol];
    if (!info) return;
    const ergogenName = ERGOGEN_NAMES[i];
    const colDef = { key: { column_net: `C${i}` } };
    if (i === 0) {
      const splay = info.angle;
      if (Math.abs(splay) > 0.5) colDef.key.splay = rd(splay);
      colDef.key.padding = rd(info.padding);
      prevCenter = info.center;
      cumulativeAngle = splay;
    } else {
      const [cx, cy] = info.center;
      const [px, py] = prevCenter;
      const dx = cx - px, dy = cy - py;
      const rad = -cumulativeAngle * Math.PI / 180;
      const spread = dx*Math.cos(rad) - dy*Math.sin(rad);
      const stagger = dx*Math.sin(rad) + dy*Math.cos(rad);
      const splay = info.angle - cumulativeAngle;
      colDef.key.spread = rd(spread);
      colDef.key.stagger = rd(stagger);
      if (Math.abs(splay) > 0.5) colDef.key.splay = rd(splay);
      colDef.key.padding = rd(info.padding);
      prevCenter = info.center;
      cumulativeAngle += splay;
    }
    columns[ergogenName] = colDef;
  });

  // Build thumb zone
  let thumbZone = null;
  if (thumbInfo && analyses.index_far) {
    const inner = analyses.index_far;
    const [icx, icy] = inner.center;
    const iRad = inner.angle * Math.PI / 180;
    const ibx = icx - inner.padding * Math.sin(iRad);
    const iby = icy - inner.padding * Math.cos(iRad);
    const [tcx, tcy] = thumbInfo.center;
    const shiftX = rd(tcx - ibx), shiftY = rd(tcy - iby);
    const thumbSplay = thumbInfo.angle;
    const nThumb = thumbInfo.nKeys;
    const thumbCols = {};
    if (nThumb <= 1) {
      thumbCols.t_inner = { key: { column_net: `C${MATRIX_COLUMNS.length}`, splay: rd(thumbSplay), spread: keySpacing } };
    } else {
      const names = ['t_inner', 't_middle', 't_outer'];
      for (let j = 0; j < Math.min(nThumb, 3); j++) {
        const col = { key: { column_net: `C${MATRIX_COLUMNS.length + j}`, spread: keySpacing } };
        if (j === 0 && Math.abs(thumbSplay) > 0.5) col.key.splay = rd(thumbSplay);
        thumbCols[names[j]] = col;
      }
    }
    thumbZone = { anchor: { ref: 'matrix_inner_bottom', shift: [shiftX, shiftY] }, columns: thumbCols, rows: { cluster: { row_net: 'R3' } } };
  }

  // Assemble config
  const config = {
    meta: { engine: '4.1.0' },
    units: { kx: keySpacing, ky: keySpacing, px: 'kx + 1', py: 'ky + 1' },
    points: {
      mirror: { ref: 'matrix_inner_home', distance: mirrorDist },
      zones: {
        matrix: {
          anchor: { shift: [100, -100] },
          columns: columns,
          rows: { bottom: { row_net: 'R2' }, home: { row_net: 'R1' }, top: { row_net: 'R0' } }
        }
      }
    },
    outlines: {
      _keycaps: [{ what: 'rectangle', where: true, size: ['kx - 0.5', 'ky - 0.5'] }],
      board: [{ what: 'rectangle', where: true, size: ['px', 'py'], bound: true, fillet: 2 }],
      switch_cutouts: [{ what: 'rectangle', where: true, size: [13.8, 13.8], bound: false }]
    },
    cases: {
      bottom_plate: [{ what: 'outline', name: 'board', extrude: 1.0 }],
      switch_plate: [
        { what: 'outline', name: 'board', extrude: 1.2 },
        { what: 'outline', name: 'switch_cutouts', extrude: 1.2, operation: 'subtract' }
      ]
    },
    pcbs: {
      keyboard: {
        outlines: { main: { outline: 'board', layer: 'Edge.Cuts' } },
        footprints: {
          cherry_ulp: { what: 'cherry_ulp', where: true, params: { from: '{{column_net}}', to: '{{colrow}}', keycaps: true } },
          diode: { what: 'diode', where: true, params: { from: '{{colrow}}', to: '{{row_net}}' }, adjust: { shift: [0, 5] } }
        }
      }
    }
  };
  if (thumbZone) config.points.zones.thumb = thumbZone;
  return config;
}

function goToPage(n) {
  if (n < 1 || n > 3) return;
  pages[currentPage].classList.remove('active');
  currentPage = n;
  pages[currentPage].classList.add('active');
  stepBtns.forEach(s => { const sn = +s.dataset.step; s.classList.toggle('active', sn === n); s.classList.toggle('done', sn < n); });
  btnBack.disabled = n === 1;
  btnNext.disabled = (n === 1 && !canAdvance()) || n === 3;
  btnNext.textContent = n === 3 ? 'Done' : 'Next';
  if (n === 2) initPage2();
  if (n === 3) renderBOM();
}

function canAdvance() {
  return COLUMNS.every(c => positions[c.id].length >= 2);
}

btnNext.addEventListener('click', () => { if (currentPage < 3 && (currentPage !== 1 || canAdvance())) goToPage(currentPage + 1); });

function resizeCanvas() {
  const wrap = canvas.parentElement;
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  drawCanvas();
}

canvas.addEventListener('pointerdown', e => {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (canvas.width / rect.width);
  const y = (e.clientY - rect.top) * (canvas.height / rect.height);
  positions[activeColumn].push({ x, y });
  drawCanvas();
  updateToolbar();
});

function drawCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // Draw grid
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 1;
  for (let x = 0; x < canvas.width; x += 50) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
  for (let y = 0; y < canvas.height; y += 50) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }

  COLUMNS.forEach(col => {
    const pts = positions[col.id];
    if (!pts.length) return;
    const isActive = col.id === activeColumn;
    // Draw points
    pts.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, isActive ? 10 : 7, 0, Math.PI * 2);
      ctx.fillStyle = col.color + (isActive ? 'cc' : '66');
      ctx.fill();
      ctx.strokeStyle = col.color;
      ctx.lineWidth = isActive ? 2 : 1;
      ctx.stroke();
    });
    // Draw trend line and key outlines if 2+ points
    if (pts.length >= 2) {
      const { angle, cx, cy, distances } = fitLine(pts);
      const rad = angle * Math.PI / 180;
      // Trend line
      const axX = Math.sin(rad), axY = Math.cos(rad);
      const len = 200;
      ctx.beginPath();
      ctx.moveTo(cx - axX*len, cy - axY*len);
      ctx.lineTo(cx + axX*len, cy + axY*len);
      ctx.strokeStyle = col.color + '44';
      ctx.lineWidth = 1;
      ctx.setLineDash([5, 5]);
      ctx.stroke();
      ctx.setLineDash([]);
      // Key outlines at fitted positions
      const padding = distances.length ? distances.reduce((a,b)=>a+b,0)/distances.length : 40;
      const sorted = pts.slice().sort((a,b) => a.y - b.y);
      const nKeys = Math.min(sorted.length, 3);
      const startOffset = -(nKeys-1)/2 * padding;
      for (let k = 0; k < nKeys; k++) {
        const off = startOffset + k * padding;
        const kx = cx + axX * off;
        const ky = cy + axY * off;
        ctx.save();
        ctx.translate(kx, ky);
        ctx.rotate(rad);
        ctx.strokeStyle = col.color + '88';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(-18, -18, 36, 36);
        ctx.restore();
      }
    }
  });
}

// ── Procedural Texture Generators ──

function generateWoodTexture(w, h) {
  const c = document.createElement('canvas'); c.width = w; c.height = h;
  const g = c.getContext('2d');
  // Base color
  g.fillStyle = '#d2b88d'; g.fillRect(0, 0, w, h);
  // Grain lines
  for (let i = 0; i < 80; i++) {
    const y = (i / 80) * h;
    const lw = 0.4 + Math.random() * 1.2;
    const shade = Math.floor(160 + Math.random() * 40);
    g.strokeStyle = `rgba(${shade - 40}, ${shade - 60}, ${shade - 90}, ${0.15 + Math.random() * 0.2})`;
    g.lineWidth = lw;
    g.beginPath();
    for (let x = 0; x < w; x += 4) {
      const wobble = Math.sin(x * 0.02 + i * 0.7) * 2 + Math.sin(x * 0.005 + i) * 4;
      if (x === 0) g.moveTo(x, y + wobble); else g.lineTo(x, y + wobble);
    }
    g.stroke();
  }
  // Knots (sparse)
  for (let k = 0; k < 3; k++) {
    const kx = Math.random() * w, ky = Math.random() * h;
    const grad = g.createRadialGradient(kx, ky, 0, kx, ky, 8 + Math.random() * 6);
    grad.addColorStop(0, 'rgba(120, 80, 40, 0.3)');
    grad.addColorStop(1, 'rgba(120, 80, 40, 0)');
    g.fillStyle = grad; g.fillRect(kx - 15, ky - 15, 30, 30);
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  // Roughness map: invert brightness
  const rc = document.createElement('canvas'); rc.width = 128; rc.height = 128;
  const rg = rc.getContext('2d');
  rg.fillStyle = '#999'; rg.fillRect(0, 0, 128, 128);
  for (let i = 0; i < 50; i++) {
    rg.strokeStyle = `rgba(180, 180, 180, 0.15)`;
    rg.lineWidth = 0.5 + Math.random();
    rg.beginPath();
    const y = (i / 50) * 128;
    for (let x = 0; x < 128; x += 3) {
      const wb = Math.sin(x * 0.03 + i) * 1.5;
      if (x === 0) rg.moveTo(x, y + wb); else rg.lineTo(x, y + wb);
    }
    rg.stroke();
  }
  const roughTex = new THREE.CanvasTexture(rc);
  roughTex.wrapS = roughTex.wrapT = THREE.RepeatWrapping;
  return { map: tex, roughnessMap: roughTex };
}

function generateCorkTexture(w, h) {
  const c = document.createElement('canvas'); c.width = w; c.height = h;
  const g = c.getContext('2d');
  g.fillStyle = '#c29a6b'; g.fillRect(0, 0, w, h);
  for (let i = 0; i < 600; i++) {
    const px = Math.random() * w, py = Math.random() * h;
    const r = 0.5 + Math.random() * 2.5;
    const b = Math.floor(140 + Math.random() * 60);
    g.fillStyle = `rgba(${b}, ${b - 30}, ${b - 60}, ${0.2 + Math.random() * 0.3})`;
    g.beginPath(); g.ellipse(px, py, r, r * (0.6 + Math.random() * 0.8), Math.random() * Math.PI, 0, Math.PI * 2); g.fill();
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  return { map: tex };
}

function generatePCBTexture(w, h, points, svgBBox) {
  const c = document.createElement('canvas'); c.width = w; c.height = h;
  const g = c.getContext('2d');
  // Solder mask — dark green
  g.fillStyle = '#145214'; g.fillRect(0, 0, w, h);
  // Fiberglass weave
  g.globalAlpha = 0.06;
  g.strokeStyle = '#1a7a1a';
  for (let i = 0; i < w; i += 2) {
    g.beginPath(); g.moveTo(i, 0); g.lineTo(i, h); g.stroke();
    g.beginPath(); g.moveTo(0, i); g.lineTo(w, i); g.stroke();
  }
  g.globalAlpha = 1;
  // Scale: map svgBBox to canvas
  const bw = svgBBox.max.x - svgBBox.min.x, bh = svgBBox.max.y - svgBBox.min.y;
  const sx = w / bw, sy = h / bh;
  function toCanvas(px, py) {
    return [(px - svgBBox.min.x) * sx, (py - svgBBox.min.y) * sy];
  }
  // Draw copper traces + pads at each key position
  const ptArr = Object.values(points);
  ptArr.forEach(pt => {
    const [cx, cy] = toCanvas(pt.x, -pt.y); // ergogen y-up → SVG y-down
    const rad = -pt.r * Math.PI / 180;
    g.save(); g.translate(cx, cy); g.rotate(rad);
    // Copper pads (gold)
    g.fillStyle = '#b08030';
    g.fillRect(-0.65 * sx - 0.35 * sx, 2.3 * sy - 1.7 * sy, 0.7 * sx, 3.4 * sy);
    g.fillRect(1.8 * sx - 0.35 * sx, 2.3 * sy - 1.7 * sy, 0.7 * sx, 3.4 * sy);
    // Ground pads
    g.fillStyle = '#907030';
    g.fillRect(-6.2 * sx - 0.8 * sx, -3.9 * sy - 1.9 * sy, 1.6 * sx, 3.8 * sy);
    g.fillRect(6.2 * sx - 0.8 * sx, 0 - 1.3 * sy, 1.6 * sx, 2.6 * sy);
    // Silkscreen outline (white)
    g.strokeStyle = 'rgba(255,255,255,0.25)'; g.lineWidth = 0.5;
    g.strokeRect(-7.1 * sx, -6.4 * sy, 14.2 * sx, 12.8 * sy);
    // Traces
    g.strokeStyle = '#906830'; g.lineWidth = 0.3 * sx;
    g.beginPath(); g.moveTo(0, 4 * sy); g.lineTo(0, 7 * sy); g.stroke();
    g.restore();
  });
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.ClampToEdgeWrapping;
  return { map: tex };
}

function generateBrushedMetalTexture(w, h) {
  const c = document.createElement('canvas'); c.width = w; c.height = h;
  const g = c.getContext('2d');
  g.fillStyle = '#b0b0b5'; g.fillRect(0, 0, w, h);
  for (let i = 0; i < h; i++) {
    const v = 160 + Math.floor(Math.random() * 40);
    g.strokeStyle = `rgb(${v},${v},${v + 5})`;
    g.lineWidth = 0.3 + Math.random() * 0.4;
    g.beginPath(); g.moveTo(0, i); g.lineTo(w, i); g.stroke();
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  return { map: tex };
}

// ── Rounded rectangle Shape helper ──
function roundedRectShape(w, h, r) {
  const s = new THREE.Shape();
  s.moveTo(-w/2 + r, -h/2);
  s.lineTo(w/2 - r, -h/2);
  s.quadraticCurveTo(w/2, -h/2, w/2, -h/2 + r);
  s.lineTo(w/2, h/2 - r);
  s.quadraticCurveTo(w/2, h/2, w/2 - r, h/2);
  s.lineTo(-w/2 + r, h/2);
  s.quadraticCurveTo(-w/2, h/2, -w/2, h/2 - r);
  s.lineTo(-w/2, -h/2 + r);
  s.quadraticCurveTo(-w/2, -h/2, -w/2 + r, -h/2);
  return s;
}

// ── Build main 3D scene ──

function build3DScene() {
  const viewport = document.getElementById('viewport');
  if (renderer) { viewport.removeChild(renderer.domElement); renderer.dispose(); }

  const w = viewport.clientWidth, h = viewport.clientHeight;
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a1a);

  // Renderer with PBR settings
  renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
  renderer.setSize(w, h);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  renderer.localClippingEnabled = true;
  viewport.appendChild(renderer.domElement);

  // Environment map for metallic reflections
  const pmrem = new THREE.PMREMGenerator(renderer);
  scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
  pmrem.dispose();

  // Camera
  camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 2000);
  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;

  // Lighting: 3-point + hemisphere
  scene.add(new THREE.AmbientLight(0xccddff, 0.25));
  const keyLight = new THREE.DirectionalLight(0xfff5e6, 1.0);
  keyLight.position.set(80, -60, 150); scene.add(keyLight);
  const fillLight = new THREE.DirectionalLight(0xe6eeff, 0.35);
  fillLight.position.set(-60, 40, 80); scene.add(fillLight);
  const rimLight = new THREE.DirectionalLight(0xffffff, 0.25);
  rimLight.position.set(0, 80, -40); scene.add(rimLight);
  scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 0.15));

  // ── Parse SVGs ──
  const boardSvg = ergogenResults.outlines.board.svg;
  const switchSvg = ergogenResults.outlines.switch_cutouts.svg;
  const loader = new SVGLoader();
  const boardShapes = [];
  loader.parse(boardSvg).paths.forEach(p => boardShapes.push(...SVGLoader.createShapes(p)));
  const switchShapes = [];
  loader.parse(switchSvg).paths.forEach(p => switchShapes.push(...SVGLoader.createShapes(p)));
  if (!boardShapes.length) { console.error('No board shapes'); return; }

  // Build switch plate shape (board with switch cutouts as holes)
  const switchPlateShapes = [];
  loader.parse(boardSvg).paths.forEach(p => {
    const shapes = SVGLoader.createShapes(p);
    shapes.forEach(s => {
      switchShapes.forEach(cutout => {
        const pts = cutout.getPoints(4);
        s.holes.push(new THREE.Path(pts));
      });
      switchPlateShapes.push(s);
    });
  });

  // ── Generate textures ──
  const woodTex = generateWoodTexture(512, 512);
  const corkTex = generateCorkTexture(256, 256);
  const metalTex = generateBrushedMetalTexture(256, 512);

  // ── PBR Materials ──
  const bambooMat = new THREE.MeshStandardMaterial({ map: woodTex.map, roughnessMap: woodTex.roughnessMap, roughness: 0.65, metalness: 0.0 });
  const corkMat = new THREE.MeshStandardMaterial({ map: corkTex.map, roughness: 0.95, metalness: 0.0 });
  const steelMat = new THREE.MeshStandardMaterial({ map: metalTex.map, roughness: 0.3, metalness: 0.85, envMapIntensity: 1.0 });
  const brassMat = new THREE.MeshStandardMaterial({ color: 0xb5a642, roughness: 0.35, metalness: 0.92 });
  const copperMat = new THREE.MeshStandardMaterial({ color: 0xb87333, roughness: 0.4, metalness: 0.9 });
  const keycapMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.82, metalness: 0.0 });
  const switchMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.5, metalness: 0.0, transparent: true, opacity: 0.75 });
  const diodeMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.6, metalness: 0.1 });
  const battMat = new THREE.MeshStandardMaterial({ color: 0x2244aa, roughness: 0.6, metalness: 0.1 });
  const blackMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.7, metalness: 0.0 });
  const redMat = new THREE.MeshStandardMaterial({ color: 0xdd3333, roughness: 0.5, metalness: 0.2 });
  const goldMat = new THREE.MeshStandardMaterial({ color: 0xffd700, roughness: 0.3, metalness: 0.9 });
  const nanoPcbMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.7, metalness: 0.1 });

  // ── Extrude helper ──
  function extrudeLayer(shapes, depth, material, zOff) {
    const grp = new THREE.Group();
    shapes.forEach(shape => {
      const geo = new THREE.ExtrudeGeometry(shape, { depth, bevelEnabled: false });
      const m = new THREE.Mesh(geo, material);
      m.position.z = zOff;
      grp.add(m);
    });
    return grp;
  }

  // ── Build layer stack ──
  // Z=0 bottom, layers stack upward
  const boardGroup = new THREE.Group();
  boardGroup.add(extrudeLayer(boardShapes, 2.0, bambooMat, 0));        // bottom plate (bamboo 2mm)
  boardGroup.add(extrudeLayer(boardShapes, 0.5, corkMat, 2.0));        // cork gasket
  // PCB layer needs texture based on bbox
  const pcbLayer = extrudeLayer(boardShapes, 1.6, corkMat, 2.5); // placeholder, replaced below
  boardGroup.add(pcbLayer);
  boardGroup.add(extrudeLayer(boardShapes, 0.5, corkMat, 4.1));        // cork gasket upper
  boardGroup.add(extrudeLayer(switchPlateShapes, 1.2, bambooMat.clone(), 4.6)); // switch plate with holes

  // Compute bbox for PCB texture and scene layout
  const bbox = new THREE.Box3().setFromObject(boardGroup);
  const center = new THREE.Vector3(); bbox.getCenter(center);
  hingeX = center.x;
  hingeZ = 2.5;

  // Now create proper PCB material with position-aware texture
  const pcbTex = generatePCBTexture(1024, 1024, ergogenResults.points, bbox);
  const pcbMat = new THREE.MeshStandardMaterial({ map: pcbTex.map, roughness: 0.7, metalness: 0.05 });
  // Replace PCB layer material
  pcbLayer.traverse(obj => { if (obj.isMesh) obj.material = pcbMat; });

  // ── Per-key components using InstancedMesh ──
  const pts = ergogenResults.points;
  const ptEntries = Object.entries(pts);
  const nKeys = ptEntries.length;

  // Switch housing: 14.2 × 12.8 × 3.5mm rounded box
  const switchGeo = new THREE.ExtrudeGeometry(roundedRectShape(14.2, 12.8, 0.5), { depth: 3.5, bevelEnabled: false });
  // Keycap: 15 × 15 × 1mm with bevel
  const keycapGeo = new THREE.ExtrudeGeometry(roundedRectShape(15, 15, 1.2), { depth: 1.0, bevelEnabled: true, bevelThickness: 0.3, bevelSize: 0.3, bevelSegments: 2 });
  // Stem: small cylinder
  const stemGeo = new THREE.CylinderGeometry(1.2, 1.2, 1.5, 8);
  stemGeo.rotateX(Math.PI / 2); // align to Z
  // Diode: SOD-123 body 2.7×1.6×1.2mm
  const diodeGeo = new THREE.BoxGeometry(2.7, 1.6, 1.2);
  // Diode leads
  const diodeLeadGeo = new THREE.BoxGeometry(0.4, 0.3, 0.8);

  const switchInst = new THREE.InstancedMesh(switchGeo, switchMat, nKeys);
  const keycapInst = new THREE.InstancedMesh(keycapGeo, keycapMat, nKeys);
  const stemInst = new THREE.InstancedMesh(stemGeo, steelMat.clone(), nKeys);
  const diodeInst = new THREE.InstancedMesh(diodeGeo, diodeMat, nKeys);
  const diodeLeadInst = new THREE.InstancedMesh(diodeLeadGeo, steelMat.clone(), nKeys * 2);

  // Store base matrices for keycap animation
  const keycapBaseMatrices = new Float32Array(nKeys * 16);
  const stemBaseMatrices = new Float32Array(nKeys * 16);

  // Z offsets in the layer stack
  const Z_SWITCH_PLATE_TOP = 4.6 + 1.2; // 5.8mm
  const Z_SWITCH_BASE = Z_SWITCH_PLATE_TOP;
  const Z_KEYCAP = Z_SWITCH_BASE + 3.5;  // 9.3mm
  const Z_STEM = Z_SWITCH_BASE + 2.5;
  const Z_PCB_TOP = 2.5 + 1.6; // 4.1mm
  const Z_DIODE = Z_PCB_TOP + 0.6;

  // Coordinate conversion: ergogen points (y-up) → SVG/scene space (y-down)
  // SVG uses y-down. Ergogen anchors at [100, -100]. The SVG bbox min/max tells us the mapping.
  // For each point: scene_x = point.x, scene_y = -point.y, scene_r = -point.r
  // We need an offset: the SVG was generated from the outline, which bounds all keys + padding.
  // The simplest: use the SVG bbox center vs points centroid to find the offset.
  const ptXs = ptEntries.map(([,p]) => p.x), ptYs = ptEntries.map(([,p]) => -p.y);
  const ptCx = ptXs.reduce((a,b) => a+b, 0) / nKeys;
  const ptCy = ptYs.reduce((a,b) => a+b, 0) / nKeys;
  const offX = center.x - ptCx, offY = center.y - ptCy;

  const dummy = new THREE.Object3D();

  ptEntries.forEach(([name, pt], i) => {
    const sx = pt.x + offX;
    const sy = -pt.y + offY;
    const sr = -pt.r * Math.PI / 180;

    // Switch housing
    dummy.position.set(sx, sy, Z_SWITCH_BASE);
    dummy.rotation.set(0, 0, sr);
    dummy.updateMatrix();
    switchInst.setMatrixAt(i, dummy.matrix);

    // Keycap (on top of switch)
    dummy.position.set(sx, sy, Z_KEYCAP);
    dummy.rotation.set(0, 0, sr);
    dummy.updateMatrix();
    keycapInst.setMatrixAt(i, dummy.matrix);
    dummy.matrix.toArray(keycapBaseMatrices, i * 16);

    // Stem
    dummy.position.set(sx, sy, Z_STEM);
    dummy.rotation.set(0, 0, sr);
    dummy.updateMatrix();
    stemInst.setMatrixAt(i, dummy.matrix);
    dummy.matrix.toArray(stemBaseMatrices, i * 16);

    // Diode on PCB (offset 5mm in local Y)
    const dox = sx + 5 * Math.sin(sr);
    const doy = sy + 5 * Math.cos(sr);
    dummy.position.set(dox, doy, Z_DIODE);
    dummy.rotation.set(0, 0, sr);
    dummy.updateMatrix();
    diodeInst.setMatrixAt(i, dummy.matrix);

    // Diode leads (two per diode)
    dummy.position.set(dox - 1.8 * Math.cos(sr), doy + 1.8 * Math.sin(sr), Z_DIODE - 0.2);
    dummy.updateMatrix();
    diodeLeadInst.setMatrixAt(i * 2, dummy.matrix);
    dummy.position.set(dox + 1.8 * Math.cos(sr), doy - 1.8 * Math.sin(sr), Z_DIODE - 0.2);
    dummy.updateMatrix();
    diodeLeadInst.setMatrixAt(i * 2 + 1, dummy.matrix);
  });

  switchInst.instanceMatrix.needsUpdate = true;
  keycapInst.instanceMatrix.needsUpdate = true;
  stemInst.instanceMatrix.needsUpdate = true;
  diodeInst.instanceMatrix.needsUpdate = true;
  diodeLeadInst.instanceMatrix.needsUpdate = true;

  boardGroup.add(switchInst);
  boardGroup.add(keycapInst);
  boardGroup.add(stemInst);
  boardGroup.add(diodeInst);
  boardGroup.add(diodeLeadInst);

  // ── nice!nano controllers ──
  function createNiceNano(posX, posY) {
    const grp = new THREE.Group();
    // PCB body 18×33×1.6mm
    const body = new THREE.Mesh(new THREE.BoxGeometry(18, 33, 1.6), nanoPcbMat);
    grp.add(body);
    // USB-C port
    const usbGeo = new THREE.BoxGeometry(8.94, 3.26, 2.56);
    const usb = new THREE.Mesh(usbGeo, steelMat.clone());
    usb.position.set(0, -33/2 + 1.6, 0.8 + 1.28); grp.add(usb);
    // Gold pads along edges
    const padGeo = new THREE.BoxGeometry(1.0, 0.5, 0.05);
    for (let j = 0; j < 12; j++) {
      const lp = new THREE.Mesh(padGeo, goldMat);
      lp.position.set(-8.5, -13 + j * 2.54, 0.825); grp.add(lp);
      const rp = new THREE.Mesh(padGeo, goldMat);
      rp.position.set(8.5, -13 + j * 2.54, 0.825); grp.add(rp);
    }
    grp.position.set(posX, posY, Z_PCB_TOP + 0.8);
    return grp;
  }
  boardGroup.add(createNiceNano(hingeX - 25, center.y - 8));
  boardGroup.add(createNiceNano(hingeX + 25, center.y - 8));

  // ── Batteries ──
  batteryGroup = new THREE.Group();
  const battGeo = new THREE.BoxGeometry(12, 30, 3);
  function addBattery(bx, by) {
    const bg = new THREE.Group();
    bg.add(new THREE.Mesh(battGeo, battMat));
    // Wires
    const wg = new THREE.CylinderGeometry(0.3, 0.3, 8, 6); wg.rotateX(Math.PI / 2);
    const rw = new THREE.Mesh(wg, redMat); rw.position.set(-2, -19, 0); bg.add(rw);
    const bw = new THREE.Mesh(wg, blackMat); bw.position.set(2, -19, 0); bg.add(bw);
    bg.position.set(bx, by, Z_PCB_TOP - 2);
    return bg;
  }
  batteryGroup.add(addBattery(hingeX - 40, center.y));
  batteryGroup.add(addBattery(hingeX + 40, center.y));
  boardGroup.add(batteryGroup);

  // ── M2 screws and heat-set inserts ──
  // Place at corners and midpoints heuristically from bbox
  const screwPositions = [];
  const bx0 = bbox.min.x + 8, bx1 = bbox.max.x - 8;
  const by0 = bbox.min.y + 8, by1 = bbox.max.y - 8;
  const bmx = center.x, bmy = center.y;
  [[bx0,by0],[bx0,by1],[bx0,bmy],[bx1,by0],[bx1,by1],[bx1,bmy],[bmx,by0],[bmx,by1]].forEach(([x,y]) => screwPositions.push({x,y}));

  // Screw: countersunk head 4mm dia × 1mm + shaft 2mm dia × 5mm
  const screwHeadGeo = new THREE.CylinderGeometry(2, 1, 1, 12);
  screwHeadGeo.rotateX(Math.PI / 2);
  const screwShaftGeo = new THREE.CylinderGeometry(1, 1, 5, 8);
  screwShaftGeo.rotateX(Math.PI / 2);
  const insertGeo = new THREE.CylinderGeometry(1.6, 1.6, 3, 12);
  insertGeo.rotateX(Math.PI / 2);
  const nScrews = screwPositions.length;

  const screwHeadInst = new THREE.InstancedMesh(screwHeadGeo, steelMat.clone(), nScrews);
  const screwShaftInst = new THREE.InstancedMesh(screwShaftGeo, steelMat.clone(), nScrews);
  const insertInst = new THREE.InstancedMesh(insertGeo, brassMat, nScrews);

  screwPositions.forEach((sp, i) => {
    // Screw head on top of switch plate
    dummy.position.set(sp.x, sp.y, Z_SWITCH_PLATE_TOP + 0.5);
    dummy.rotation.set(0, 0, 0);
    dummy.updateMatrix();
    screwHeadInst.setMatrixAt(i, dummy.matrix);
    // Shaft going down through all layers
    dummy.position.set(sp.x, sp.y, Z_SWITCH_PLATE_TOP - 2.5);
    dummy.updateMatrix();
    screwShaftInst.setMatrixAt(i, dummy.matrix);
    // Heat-set insert in bottom plate
    dummy.position.set(sp.x, sp.y, 1.0);
    dummy.updateMatrix();
    insertInst.setMatrixAt(i, dummy.matrix);
  });
  screwHeadInst.instanceMatrix.needsUpdate = true;
  screwShaftInst.instanceMatrix.needsUpdate = true;
  insertInst.instanceMatrix.needsUpdate = true;
  boardGroup.add(screwHeadInst);
  boardGroup.add(screwShaftInst);
  boardGroup.add(insertInst);

  // ── Split into left/right halves with clipping ──
  leftGroup = new THREE.Group();
  rightGroup = new THREE.Group();

  const clipLeft = new THREE.Plane(new THREE.Vector3(1, 0, 0), -hingeX);
  const clipRight = new THREE.Plane(new THREE.Vector3(-1, 0, 0), hingeX);

  function cloneToHalf(src, clipPlane, target) {
    src.children.forEach(child => {
      const c = child.clone(true); // deep clone
      c.traverse(obj => {
        if (obj.isMesh || obj.isInstancedMesh) {
          obj.material = obj.material.clone();
          obj.material.clippingPlanes = [clipPlane];
          obj.material.clipShadows = true;
        }
      });
      target.add(c);
    });
  }
  cloneToHalf(boardGroup, clipLeft, leftGroup);
  cloneToHalf(boardGroup, clipRight, rightGroup);
  scene.add(leftGroup);
  scene.add(rightGroup);

  // Store keycap instanced mesh refs for interaction
  leftGroup.traverse(obj => { if (obj.isInstancedMesh && obj.geometry === keycapGeo) keycapMeshL = obj; });
  rightGroup.traverse(obj => { if (obj.isInstancedMesh && obj.geometry === keycapGeo) keycapMeshR = obj; });
  keycapBaseL = new Float32Array(keycapBaseMatrices);
  keycapBaseR = new Float32Array(keycapBaseMatrices);

  // ── Ball joint hinge ──
  hingeGroup = new THREE.Group();
  const hy = center.y, hz2 = hingeZ;
  // Outer housing
  const hGeo = new THREE.CylinderGeometry(5, 5, 16, 24);
  hGeo.rotateZ(Math.PI / 2);
  hingeGroup.add(new THREE.Mesh(hGeo, steelMat.clone())).position.set(hingeX, hy, hz2);
  // Ball
  hingeGroup.add(new THREE.Mesh(new THREE.SphereGeometry(4, 24, 24), copperMat)).position.set(hingeX, hy, hz2);
  // Rod stubs
  const rodGeo = new THREE.CylinderGeometry(3, 3, 12, 8); rodGeo.rotateZ(Math.PI / 2);
  hingeGroup.add(new THREE.Mesh(rodGeo, steelMat.clone())).position.set(hingeX - 14, hy, hz2);
  hingeGroup.add(new THREE.Mesh(rodGeo, steelMat.clone())).position.set(hingeX + 14, hy, hz2);
  // Mounting plates
  const platGeo = new THREE.BoxGeometry(8, 14, 2);
  hingeGroup.add(new THREE.Mesh(platGeo, steelMat.clone())).position.set(hingeX - 22, hy, hz2);
  hingeGroup.add(new THREE.Mesh(platGeo, steelMat.clone())).position.set(hingeX + 22, hy, hz2);
  // Thumb nut
  const tnutGeo = new THREE.CylinderGeometry(5, 5, 4, 6);
  const tnut = new THREE.Mesh(tnutGeo, brassMat);
  tnut.position.set(hingeX, hy - 10, hz2); tnut.rotation.x = Math.PI / 2;
  hingeGroup.add(tnut);
  scene.add(hingeGroup);

  // ── Cables with slight droop ──
  cablesGroup = new THREE.Group();
  const cableZ = Z_SWITCH_PLATE_TOP + 1;
  const cYtop = bbox.min.y + (bbox.max.y - bbox.min.y) * 0.15;
  const cYbot = bbox.min.y + (bbox.max.y - bbox.min.y) * 0.85;
  const cableMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.4, metalness: 0.6 });
  [cYtop, cYbot].forEach(cy => {
    const halfLen = (bbox.max.x - bbox.min.x) / 2;
    const pts3 = [
      new THREE.Vector3(bbox.min.x + 5, cy, cableZ),
      new THREE.Vector3(bbox.min.x + halfLen * 0.5, cy, cableZ - 1),
      new THREE.Vector3(center.x, cy, cableZ - 1.5),
      new THREE.Vector3(bbox.max.x - halfLen * 0.5, cy, cableZ - 1),
      new THREE.Vector3(bbox.max.x - 5, cy, cableZ),
    ];
    const curve = new THREE.CatmullRomCurve3(pts3);
    const tubeGeo = new THREE.TubeGeometry(curve, 32, 0.75, 8, false);
    cablesGroup.add(new THREE.Mesh(tubeGeo, cableMat));
    // Turnbuckle at center
    const tbGeo = new THREE.CylinderGeometry(2.5, 2.5, 20, 8); tbGeo.rotateZ(Math.PI / 2);
    const tb = new THREE.Mesh(tbGeo, steelMat.clone()); tb.position.set(center.x, cy, cableZ - 1.5);
    cablesGroup.add(tb);
    // Clevis pins at ends
    [bbox.min.x + 5, bbox.max.x - 5].forEach(px => {
      const pinGeo = new THREE.CylinderGeometry(1.5, 1.5, 5, 8);
      const pin = new THREE.Mesh(pinGeo, steelMat.clone()); pin.position.set(px, cy, cableZ);
      cablesGroup.add(pin);
      const det = new THREE.Mesh(new THREE.SphereGeometry(1, 10, 10), redMat);
      det.position.set(px, cy, cableZ + 3); cablesGroup.add(det);
    });
  });
  scene.add(cablesGroup);

  // ── Camera ──
  const size = new THREE.Vector3(); bbox.getSize(size);
  const maxDim = Math.max(size.x, size.y);
  camera.position.set(center.x, center.y - maxDim * 0.5, maxDim * 0.9);
  controls.target.set(center.x, center.y, Z_KEYCAP / 2);
  controls.update();

  document.getElementById('fold-slider').value = 0;
  document.getElementById('fold-val').textContent = '0';

  // ── Key press interaction ──
  renderer.domElement.addEventListener('pointerdown', onKeyPress);

  if (!page2Initialized) {
    page2Initialized = true;
    animate();
  }
}

// ── Key press handler ──
function onKeyPress(event) {
  const rect = renderer.domElement.getBoundingClientRect();
  pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const targets = [keycapMeshL, keycapMeshR].filter(Boolean);
  const hits = raycaster.intersectObjects(targets);
  if (!hits.length) return;
  const hit = hits[0];
  const id = hit.instanceId;
  const mesh = hit.object;
  const bases = mesh === keycapMeshL ? keycapBaseL : keycapBaseR;
  const key = `${mesh.id}_${id}`;
  if (pressedKeys.has(key)) return;
  pressedKeys.set(key, { id, mesh, bases, progress: 0, dir: 'down', t0: performance.now() });
}

function updateKeyPresses() {
  const now = performance.now();
  for (const [key, st] of pressedKeys) {
    const elapsed = now - st.t0;
    if (st.dir === 'down') {
      st.progress = Math.min(1, elapsed / PRESS_DOWN_MS);
      if (st.progress >= 1) { st.dir = 'up'; st.t0 = now; }
    } else {
      st.progress = Math.max(0, 1 - elapsed / PRESS_UP_MS);
      if (st.progress <= 0) {
        const bm = new THREE.Matrix4(); bm.fromArray(st.bases, st.id * 16);
        st.mesh.setMatrixAt(st.id, bm);
        st.mesh.instanceMatrix.needsUpdate = true;
        pressedKeys.delete(key); continue;
      }
    }
    const ease = st.progress * (2 - st.progress); // easeOutQuad
    const bm = new THREE.Matrix4(); bm.fromArray(st.bases, st.id * 16);
    const pos = new THREE.Vector3(), quat = new THREE.Quaternion(), scl = new THREE.Vector3();
    bm.decompose(pos, quat, scl);
    pos.z -= PRESS_DEPTH * ease;
    st.mesh.setMatrixAt(st.id, new THREE.Matrix4().compose(pos, quat, scl));
    st.mesh.instanceMatrix.needsUpdate = true;
  }
}

// ── Fold ──
function applyFold(angleDeg) {
  if (!leftGroup || !rightGroup) return;
  const halfRad = (angleDeg * Math.PI / 180) / 2;

  // Reset
  leftGroup.matrix.identity(); leftGroup.matrix.decompose(leftGroup.position, leftGroup.quaternion, leftGroup.scale);
  rightGroup.matrix.identity(); rightGroup.matrix.decompose(rightGroup.position, rightGroup.quaternion, rightGroup.scale);

  if (angleDeg > 0) {
    const pivot = new THREE.Vector3(hingeX, 0, hingeZ);
    const yAxis = new THREE.Vector3(0, 1, 0);
    // Left
    leftGroup.position.sub(pivot);
    leftGroup.position.applyAxisAngle(yAxis, halfRad);
    leftGroup.position.add(pivot);
    leftGroup.rotateOnWorldAxis(yAxis, halfRad);
    // Right
    rightGroup.position.sub(pivot);
    rightGroup.position.applyAxisAngle(yAxis, -halfRad);
    rightGroup.position.add(pivot);
    rightGroup.rotateOnWorldAxis(yAxis, -halfRad);
  }
  if (cablesGroup) cablesGroup.visible = angleDeg === 0 && document.getElementById('show-cables').checked;
}

document.getElementById('fold-slider').addEventListener('input', e => {
  const v = +e.target.value;
  document.getElementById('fold-val').textContent = v;
  applyFold(v);
});
document.getElementById('show-cables').addEventListener('change', e => { if (cablesGroup) cablesGroup.visible = e.target.checked && +document.getElementById('fold-slider').value === 0; });
document.getElementById('show-hinge').addEventListener('change', e => { if (hingeGroup) hingeGroup.visible = e.target.checked; });
document.getElementById('show-battery').addEventListener('change', e => { if (batteryGroup) batteryGroup.visible = e.target.checked; });

function animate() {
  requestAnimationFrame(animate);
  updateKeyPresses();
  if (controls) controls.update();
  if (renderer && scene && camera) renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  if (!renderer) return;
  const vp = document.getElementById('viewport');
  const w = vp.clientWidth, h = vp.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});


// ══════════════════════════════════════════════════════════════════
// PAGE 3: BOM
// ══════════════════════════════════════════════════════════════════

function renderBOM() {
  const el = document.getElementById('bom-content');
  let html = '';
  let grand = 0;
  BOM.forEach(phase => {
    html += `<h2>${phase.name}</h2>`;
    html += '<table><tr><th>Qty</th><th>Component</th><th>Unit Price</th><th>Total</th></tr>';
    phase.items.forEach(item => {
      const link = item.url ? `<a href="${item.url}" target="_blank" rel="noopener">${item.component}</a>` : item.component;
      html += `<tr><td>${item.qty}</td><td>${link}</td><td>&euro;${item.price.toFixed(2)}</td><td>&euro;${item.total.toFixed(2)}</td></tr>`;
    });
    html += `</table><div class="phase-total">Subtotal: &euro;${phase.total.toFixed(2)}</div>`;
    grand += phase.total;
  });
  html += `<div class="grand-total">Grand Total: &euro;${grand.toFixed(2)}</div>`;
  el.innerHTML = html;
}

document.getElementById('btn-download').addEventListener('click', async () => {
  if (!ergogenResults) { alert('No design generated yet. Go back to step 2.'); return; }
  const zip = new JSZip();
  const outlines = ergogenResults.outlines;
  for (const [name, content] of Object.entries(outlines)) {
    if (content && typeof content === 'object') {
      if (content.svg) zip.file(`outlines/${name}.svg`, content.svg);
      if (content.dxf) zip.file(`outlines/${name}.dxf`, content.dxf);
    }
  }
  if (generatedConfig) {
    zip.file('config.yaml', jsyaml.dump(generatedConfig, { sortKeys: false }));
  }
  const blob = await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'keyboard-design.zip';
  a.click();
  URL.revokeObjectURL(a.href);
});
